<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ficha de Evolução Fisioterapêutica</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />

  <!-- 
    ============================================================
    FIREBASE INTEGRATION — PREPARADO MAS DESATIVADO
    Para ativar:
      1. npm install firebase  (ou carregue via CDN abaixo)
      2. Substitua os valores de firebaseConfig
      3. Troque USE_FIREBASE = false  para  true
    ============================================================

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
      import { getFirestore, collection, doc, setDoc, getDocs, deleteDoc, updateDoc }
        from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
    </script>

    const firebaseConfig = {
      apiKey: "SUA_API_KEY",
      authDomain: "seu-projeto.firebaseapp.com",
      projectId: "seu-projeto",
      storageBucket: "seu-projeto.appspot.com",
      messagingSenderId: "000000000000",
      appId: "1:000000000000:web:xxxxxxxxxxxxxxxx"
    };
  -->

  <style>
    :root {
      --green-dark:   #1e4a30;
      --green-mid:    #2d7a4f;
      --green-light:  #4fbe72;
      --green-pale:   #e8f5ee;
      --accent:       #c8f535;
      --text-dark:    #0f1f16;
      --text-mid:     #3a5a46;
      --text-muted:   #7a9a86;
      --bg:           #f4faf6;
      --card-bg:      #ffffff;
      --border:       #cde0d5;
      --danger:       #dc3545;
      --danger-dark:  #a71d2a;
      --shadow-sm:    0 2px 8px rgba(30,74,48,.08);
      --shadow-md:    0 6px 24px rgba(30,74,48,.13);
      --shadow-lg:    0 16px 48px rgba(30,74,48,.18);
      --radius:       12px;
      --radius-sm:    8px;
      --font-display: 'Lora', Georgia, serif;
      --font-body:    'DM Sans', system-ui, sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--text-dark);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── HEADER ─────────────────────────────────────────── */
    .app-header {
      background: linear-gradient(135deg, var(--green-dark) 0%, var(--green-mid) 100%);
      color: #fff;
      padding: 28px 40px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      box-shadow: var(--shadow-md);
    }
    .app-header-left h1 {
      font-family: var(--font-display);
      font-size: 24px;
      font-weight: 700;
      letter-spacing: -.3px;
    }
    .app-header-left p {
      font-size: 13px;
      opacity: .75;
      margin-top: 4px;
    }
    .header-badge {
      background: var(--accent);
      color: var(--green-dark);
      font-size: 11px;
      font-weight: 700;
      padding: 4px 10px;
      border-radius: 99px;
      letter-spacing: .5px;
      text-transform: uppercase;
    }

    /* ── LAYOUT ─────────────────────────────────────────── */
    .main-content {
      flex: 1;
      max-width: 960px;
      width: 100%;
      margin: 32px auto;
      padding: 0 20px;
      display: flex;
      flex-direction: column;
      gap: 28px;
    }

    /* ── CARDS / SECTIONS ───────────────────────────────── */
    .card {
      background: var(--card-bg);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      box-shadow: var(--shadow-sm);
      overflow: hidden;
    }
    .card-header {
      background: var(--green-pale);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .card-header h2 {
      font-family: var(--font-display);
      font-size: 17px;
      color: var(--green-dark);
    }
    .card-body { padding: 24px; }

    /* ── FORM ───────────────────────────────────────────── */
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    .form-row.single { grid-template-columns: 1fr; }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    label {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-mid);
      letter-spacing: .3px;
    }
    label .optional {
      font-weight: 400;
      color: var(--text-muted);
      font-size: 11px;
      margin-left: 4px;
    }
    input, textarea, select {
      font-family: var(--font-body);
      font-size: 14px;
      padding: 10px 14px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-dark);
      background: #fff;
      transition: border-color .2s, box-shadow .2s;
    }
    input:focus, textarea:focus, select:focus {
      outline: none;
      border-color: var(--green-light);
      box-shadow: 0 0 0 3px rgba(79,190,114,.15);
    }
    textarea { resize: vertical; min-height: 110px; }

    /* ── BUTTONS ─────────────────────────────────────────── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 10px 20px;
      border: none;
      border-radius: var(--radius-sm);
      font-family: var(--font-body);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: transform .15s, box-shadow .15s, background .15s;
      white-space: nowrap;
    }
    .btn:hover { transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }

    .btn-primary {
      background: linear-gradient(135deg, var(--green-dark), var(--green-mid));
      color: #fff;
    }
    .btn-primary:hover { box-shadow: 0 4px 14px rgba(30,74,48,.35); }

    .btn-success {
      background: var(--green-light);
      color: var(--green-dark);
    }
    .btn-success:hover { background: #3daa60; color: #fff; }

    .btn-pdf {
      background: #fff;
      color: var(--green-dark);
      border: 1.5px solid var(--green-mid);
    }
    .btn-pdf:hover { background: var(--green-pale); }

    .btn-danger {
      background: transparent;
      color: var(--danger);
      border: 1.5px solid var(--danger);
      padding: 6px 14px;
      font-size: 13px;
    }
    .btn-danger:hover { background: var(--danger); color: #fff; }

    .btn-icon {
      background: transparent;
      color: var(--text-muted);
      padding: 6px 10px;
      border-radius: 6px;
      font-size: 16px;
    }
    .btn-icon:hover { background: var(--green-pale); color: var(--green-dark); }

    /* ── TOOLBAR (filtro + add) ──────────────────────────── */
    .toolbar {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .search-wrap {
      flex: 1;
      position: relative;
      min-width: 200px;
    }
    .search-wrap svg {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      pointer-events: none;
    }
    .search-wrap input {
      padding-left: 38px;
      width: 100%;
    }

    /* ── PATIENT CARD ────────────────────────────────────── */
    .patient-card {
      background: var(--card-bg);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 16px;
      overflow: hidden;
      box-shadow: var(--shadow-sm);
      transition: box-shadow .2s;
    }
    .patient-card:hover { box-shadow: var(--shadow-md); }

    .patient-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      cursor: pointer;
      user-select: none;
      gap: 12px;
      background: var(--card-bg);
    }
    .patient-card-header:hover { background: var(--green-pale); }

    .patient-info { flex: 1; }
    .patient-name {
      font-family: var(--font-display);
      font-size: 17px;
      font-weight: 700;
      color: var(--green-dark);
    }
    .patient-meta {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 3px;
    }
    .patient-count {
      background: var(--green-pale);
      color: var(--green-mid);
      font-size: 12px;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 99px;
      border: 1px solid var(--border);
    }
    .chevron {
      color: var(--text-muted);
      transition: transform .25s;
      font-size: 18px;
      line-height: 1;
    }
    .patient-card.open .chevron { transform: rotate(180deg); }

    .patient-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    /* ── ACCORDION BODY ─────────────────────────────────── */
    .accordion-body {
      max-height: 0;
      overflow: hidden;
      transition: max-height .35s ease;
      border-top: 0px solid var(--border);
    }
    .patient-card.open .accordion-body {
      max-height: 9999px;
      border-top-width: 1px;
    }
    .accordion-inner { padding: 20px; display: flex; flex-direction: column; gap: 12px; }

    /* ── EVOLUTION ENTRY ────────────────────────────────── */
    .evolution-entry {
      background: var(--bg);
      border: 1px solid var(--border);
      border-left: 4px solid var(--green-mid);
      border-radius: var(--radius-sm);
      padding: 14px 16px;
    }
    .evolution-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }
    .evolution-date {
      font-weight: 700;
      font-size: 13px;
      color: var(--green-dark);
    }
    .evolution-text {
      font-size: 14px;
      color: var(--text-dark);
      line-height: 1.65;
      white-space: pre-wrap;
    }
    .evolution-signature {
      font-style: italic;
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 10px;
      padding-top: 8px;
      border-top: 1px dashed var(--border);
    }
    .no-evolutions {
      text-align: center;
      padding: 24px;
      color: var(--text-muted);
      font-size: 14px;
      font-style: italic;
    }

    /* ── TOAST / ALERT ──────────────────────────────────── */
    .toast-container {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .toast {
      background: var(--green-dark);
      color: #fff;
      padding: 12px 20px;
      border-radius: var(--radius-sm);
      font-size: 14px;
      font-weight: 500;
      box-shadow: var(--shadow-lg);
      animation: slideIn .25s ease;
    }
    .toast.error { background: var(--danger-dark); }
    @keyframes slideIn {
      from { opacity: 0; transform: translateX(30px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    /* ── MODAL ───────────────────────────────────────────── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(15,31,22,.55);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .modal-overlay.active { display: flex; }
    .modal {
      background: var(--card-bg);
      border-radius: var(--radius);
      width: 100%;
      max-width: 560px;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: var(--shadow-lg);
      animation: modalIn .25s ease;
    }
    @keyframes modalIn {
      from { opacity: 0; transform: translateY(-20px) scale(.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    .modal-header {
      background: var(--green-pale);
      border-bottom: 1px solid var(--border);
      padding: 18px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .modal-header h2 {
      font-family: var(--font-display);
      font-size: 18px;
      color: var(--green-dark);
    }
    .modal-body { padding: 24px; display: flex; flex-direction: column; gap: 18px; }
    .modal-footer {
      padding: 16px 24px;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: flex-end;
      gap: 10px;
    }

    /* ── DIALOG DE CONFIRMAÇÃO ──────────────────────────── */
    .confirm-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(15,31,22,.55);
      z-index: 2000;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .confirm-overlay.active { display: flex; }
    .confirm-box {
      background: #fff;
      border-radius: var(--radius);
      padding: 28px;
      max-width: 380px;
      width: 100%;
      box-shadow: var(--shadow-lg);
      text-align: center;
    }
    .confirm-box h3 { font-family: var(--font-display); font-size: 18px; color: var(--text-dark); margin-bottom: 10px; }
    .confirm-box p  { font-size: 14px; color: var(--text-muted); margin-bottom: 24px; }
    .confirm-box .confirm-actions { display: flex; gap: 12px; justify-content: center; }
    .btn-confirm-cancel { background: var(--bg); color: var(--text-dark); border: 1.5px solid var(--border); }
    .btn-confirm-ok     { background: var(--danger); color: #fff; border: none; }

    /* ── EMPTY STATE ─────────────────────────────────────── */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
    }
    .empty-state svg { opacity: .3; margin-bottom: 16px; }
    .empty-state h3 { font-size: 18px; color: var(--text-mid); margin-bottom: 8px; }

    /* ── FOOTER ──────────────────────────────────────────── */
    footer {
      background: linear-gradient(135deg, var(--green-dark) 0%, var(--green-mid) 100%);
      color: rgba(255,255,255,.9);
      padding: 22px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: auto;
    }
    .footer-signature { font-family: var(--font-display); font-size: 15px; font-style: italic; }
    .footer-signature span {
      font-family: var(--font-body);
      font-size: 12px;
      opacity: .7;
      display: block;
      font-style: normal;
      margin-top: 2px;
    }
    .footer-right { font-size: 12px; opacity: .6; text-align: right; }

    /* ── RESPONSIVE ─────────────────────────────────────── */
    @media (max-width: 640px) {
      .app-header { padding: 20px; }
      .form-row { grid-template-columns: 1fr; }
      .patient-actions .btn { padding: 8px 12px; font-size: 12px; }
      footer { flex-direction: column; text-align: center; }
      .footer-right { text-align: center; }
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header class="app-header">
    <div class="app-header-left">
      <h1>Ficha de Evolução Fisioterapêutica</h1>
      <p>Registro diário de atendimentos</p>
    </div>
    <span class="header-badge">v2.0</span>
  </header>

  <!-- MAIN -->
  <main class="main-content">

    <!-- Cadastro de Paciente -->
    <div class="card">
      <div class="card-header">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        <h2>Novo Paciente</h2>
      </div>
      <div class="card-body">
        <div class="form-row">
          <div class="form-group">
            <label>Nome completo</label>
            <input type="text" id="patientName" placeholder="Ex.: Maria Silva" />
          </div>
          <div class="form-group">
            <label>Contato <span class="optional">(opcional)</span></label>
            <input type="tel" id="patientContact" placeholder="(79) 99999-9999" />
          </div>
        </div>
        <div style="margin-top:16px;">
          <button class="btn btn-primary" onclick="addPatient()">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Adicionar Paciente
          </button>
        </div>
      </div>
    </div>

    <!-- Lista de Pacientes -->
    <div class="card">
      <div class="card-header" style="justify-content: space-between; flex-wrap: wrap; gap: 10px;">
        <div style="display:flex;align-items:center;gap:10px;">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
          <h2>Pacientes</h2>
        </div>
        <div class="toolbar">
          <div class="search-wrap">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input type="text" id="searchInput" placeholder="Buscar paciente..." oninput="renderPatients()" />
          </div>
        </div>
      </div>
      <div class="card-body" style="padding: 16px;">
        <div id="patientsList"></div>
      </div>
    </div>

  </main>

  <!-- FOOTER -->
  <footer>
    <div class="footer-signature">
      <div id="footerFisioName">Fisioterapeuta Responsável</div>
      <span id="footerFisioCoren">COREN/CREFITO — CRF nº _______</span>
    </div>
    <div class="footer-right">
      <div>Ficha de Evolução Fisioterapêutica</div>
      <div id="footerDate"></div>
    </div>
  </footer>

  <!-- TOAST -->
  <div class="toast-container" id="toastContainer"></div>

  <!-- MODAL: Evolução -->
  <div class="modal-overlay" id="evolutionModalOverlay" role="dialog" aria-modal="true">
    <div class="modal">
      <div class="modal-header">
        <h2>Registrar Evolução</h2>
        <button class="btn btn-icon" onclick="closeModal()" title="Fechar">✕</button>
      </div>
      <div class="modal-body">
        <div class="form-row">
          <div class="form-group">
            <label>Data</label>
            <input type="date" id="evolutionDate" />
          </div>
        </div>
        <div class="form-group form-row single">
          <label>Condutas Realizadas e Observações</label>
          <textarea id="evolutionText" placeholder="Descreva as condutas realizadas, resposta do paciente e observações clínicas..."></textarea>
        </div>
        <div class="form-group form-row single">
          <label>Assinatura do Fisioterapeuta</label>
          <input type="text" id="fisioSignature" placeholder="Nome e CREFITO do fisioterapeuta" />
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn" style="background:var(--bg);color:var(--text-dark);border:1.5px solid var(--border);" onclick="closeModal()">Cancelar</button>
        <button class="btn btn-primary" onclick="saveEvolution()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
          Salvar Evolução
        </button>
      </div>
    </div>
  </div>

  <!-- DIALOG: Confirmação -->
  <div class="confirm-overlay" id="confirmOverlay">
    <div class="confirm-box">
      <h3 id="confirmTitle">Confirmar ação</h3>
      <p id="confirmMessage">Tem certeza?</p>
      <div class="confirm-actions">
        <button class="btn btn-confirm-cancel" onclick="closeConfirm(false)">Cancelar</button>
        <button class="btn btn-confirm-ok" onclick="closeConfirm(true)">Remover</button>
      </div>
    </div>
  </div>

  <script>
    // ============================================================
    // CAMADA DE DADOS — troque por Firebase quando necessário
    // USE_FIREBASE = false  →  localStorage
    // USE_FIREBASE = true   →  Firestore (configure abaixo)
    // ============================================================
    const USE_FIREBASE = false;

    /* -- Firebase stub (substitua pelo SDK real) ---------------
    import { initializeApp } from "firebase/app";
    import { getFirestore, collection, doc, setDoc,
             getDocs, deleteDoc } from "firebase/firestore";

    const firebaseConfig = {
      apiKey: "...", authDomain: "...", projectId: "...",
      storageBucket: "...", messagingSenderId: "...", appId: "..."
    };
    const app = initializeApp(firebaseConfig);
    const db  = getFirestore(app);
    ------------------------------------------------------------- */

    const DB = {
      async load() {
        if (USE_FIREBASE) {
          // const snap = await getDocs(collection(db, "patients"));
          // return snap.docs.map(d => ({ id: d.id, ...d.data() }));
        }
        return JSON.parse(localStorage.getItem('fisioterapiaData') || '[]');
      },
      async save(patients) {
        if (USE_FIREBASE) {
          // for (const p of patients) {
          //   await setDoc(doc(db, "patients", String(p.id)), p);
          // }
          return;
        }
        localStorage.setItem('fisioterapiaData', JSON.stringify(patients));
      },
      async remove(id) {
        if (USE_FIREBASE) {
          // await deleteDoc(doc(db, "patients", String(id)));
          return;
        }
        // handled by filtering patients array + save()
      }
    };

    // ============================================================
    // ESTADO
    // ============================================================
    let patients = [];
    let currentPatientId = null;
    let confirmCallback = null;

    // ============================================================
    // INICIALIZAÇÃO
    // ============================================================
    window.addEventListener('DOMContentLoaded', async () => {
      patients = await DB.load();
      renderPatients();
      setFooterDate();
    });

    function setFooterDate() {
      document.getElementById('footerDate').textContent =
        new Date().toLocaleDateString('pt-BR', { day:'2-digit', month:'long', year:'numeric' });
    }

    // ============================================================
    // SEGURANÇA — escape de HTML (previne XSS)
    // ============================================================
    function esc(str) {
      return String(str ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    // ============================================================
    // TOAST
    // ============================================================
    function toast(msg, type = 'success') {
      const el = document.createElement('div');
      el.className = 'toast' + (type === 'error' ? ' error' : '');
      el.textContent = msg;
      document.getElementById('toastContainer').appendChild(el);
      setTimeout(() => el.remove(), 3200);
    }

    // ============================================================
    // DIALOG DE CONFIRMAÇÃO CUSTOMIZADO
    // ============================================================
    function openConfirm(title, msg) {
      return new Promise(resolve => {
        confirmCallback = resolve;
        document.getElementById('confirmTitle').textContent   = title;
        document.getElementById('confirmMessage').textContent = msg;
        document.getElementById('confirmOverlay').classList.add('active');
      });
    }
    function closeConfirm(result) {
      document.getElementById('confirmOverlay').classList.remove('active');
      if (confirmCallback) { confirmCallback(result); confirmCallback = null; }
    }

    // ============================================================
    // PACIENTES
    // ============================================================
    async function addPatient() {
      const name    = document.getElementById('patientName').value.trim();
      const contact = document.getElementById('patientContact').value.trim();
      if (!name) { toast('Digite o nome do paciente.', 'error'); return; }

      const patient = { id: Date.now(), name, contact, evolutions: [] };
      patients.push(patient);
      await DB.save(patients);
      renderPatients();
      document.getElementById('patientName').value    = '';
      document.getElementById('patientContact').value = '';
      toast('Paciente adicionado com sucesso!');
    }

    async function removePatient(id) {
      const ok = await openConfirm('Remover paciente', 'Todos os dados e evoluções deste paciente serão excluídos permanentemente.');
      if (!ok) return;
      patients = patients.filter(p => p.id !== id);
      await DB.remove(id);
      await DB.save(patients);
      renderPatients();
      toast('Paciente removido.');
    }

    // ============================================================
    // MODAL DE EVOLUÇÃO
    // ============================================================
    function openEvolutionModal(id) {
      currentPatientId = id;
      document.getElementById('evolutionDate').valueAsDate = new Date();
      document.getElementById('evolutionModalOverlay').classList.add('active');
    }

    function closeModal() {
      document.getElementById('evolutionModalOverlay').classList.remove('active');
      document.getElementById('evolutionText').value      = '';
      document.getElementById('fisioSignature').value     = '';
      currentPatientId = null;
    }

    async function saveEvolution() {
      const date      = document.getElementById('evolutionDate').value;
      const text      = document.getElementById('evolutionText').value.trim();
      const signature = document.getElementById('fisioSignature').value.trim();
      if (!date || !text || !signature) { toast('Preencha todos os campos.', 'error'); return; }

      const patient = patients.find(p => p.id === currentPatientId);
      if (!patient) return;

      patient.evolutions.push({ id: Date.now(), date, text, signature });
      // Ordena sempre por data desc ao salvar
      patient.evolutions.sort((a, b) => b.date.localeCompare(a.date));

      await DB.save(patients);
      renderPatients(true, currentPatientId);
      closeModal();
      toast('Evolução registrada!');
    }

    async function removeEvolution(patientId, evolutionId) {
      const ok = await openConfirm('Remover evolução', 'Esta evolução será excluída permanentemente.');
      if (!ok) return;
      const patient = patients.find(p => p.id === patientId);
      if (patient) {
        patient.evolutions = patient.evolutions.filter(e => e.id !== evolutionId);
        await DB.save(patients);
        renderPatients(true, patientId);
        toast('Evolução removida.');
      }
    }

    // ============================================================
    // FORMATAÇÃO
    // ============================================================
    function formatDate(ds) {
      return new Date(ds + 'T00:00:00').toLocaleDateString('pt-BR');
    }

    // ============================================================
    // RENDER
    // ============================================================
    function renderPatients(keepOpen = false, openId = null) {
      const container  = document.getElementById('patientsList');
      const query      = document.getElementById('searchInput').value.trim().toLowerCase();
      const filtered   = patients.filter(p => p.name.toLowerCase().includes(query));

      if (filtered.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
            <h3>${query ? 'Nenhum resultado encontrado' : 'Nenhum paciente cadastrado'}</h3>
            <p>${query ? 'Tente outro nome.' : 'Adicione o primeiro paciente acima.'}</p>
          </div>`;
        return;
      }

      container.innerHTML = filtered.map(patient => {
        const isOpen = keepOpen && patient.id === openId;
        const count  = patient.evolutions.length;

        const evols = count === 0
          ? `<div class="no-evolutions">Nenhuma evolução registrada ainda.</div>`
          : patient.evolutions.map(ev => `
              <div class="evolution-entry">
                <div class="evolution-header">
                  <div class="evolution-date">📅 ${esc(formatDate(ev.date))}</div>
                  <button class="btn btn-danger" onclick="removeEvolution(${patient.id}, ${ev.id})">🗑 Remover</button>
                </div>
                <div class="evolution-text">${esc(ev.text)}</div>
                <div class="evolution-signature">✍️ ${esc(ev.signature)}</div>
              </div>`).join('');

        return `
          <div class="patient-card ${isOpen ? 'open' : ''}" id="pcard-${patient.id}">
            <div class="patient-card-header" onclick="toggleCard(${patient.id})">
              <div class="patient-info">
                <div class="patient-name">👤 ${esc(patient.name)}</div>
                <div class="patient-meta">${patient.contact ? '📞 ' + esc(patient.contact) : 'Sem contato informado'}</div>
              </div>
              <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
                <div class="patient-actions" onclick="event.stopPropagation()">
                  <button class="btn btn-success" onclick="openEvolutionModal(${patient.id})">➕ Nova Evolução</button>
                  <button class="btn btn-pdf"     onclick="generatePDF(${patient.id})">📄 PDF</button>
                  <button class="btn btn-danger"  onclick="removePatient(${patient.id})">🗑 Remover</button>
                </div>
                <span class="patient-count">${count} evolução${count !== 1 ? 'ões' : ''}</span>
                <span class="chevron">▼</span>
              </div>
            </div>
            <div class="accordion-body">
              <div class="accordion-inner">${evols}</div>
            </div>
          </div>`;
      }).join('');
    }

    function toggleCard(id) {
      const card = document.getElementById('pcard-' + id);
      if (card) card.classList.toggle('open');
    }

    // ============================================================
    // FECHA MODAL AO CLICAR FORA / ESC
    // ============================================================
    document.getElementById('evolutionModalOverlay').addEventListener('click', function(e) {
      if (e.target === this) closeModal();
    });
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') { closeModal(); closeConfirm(false); }
    });

    // ============================================================
    // GERAÇÃO DE PDF — qualidade aprimorada
    // ============================================================
    function generatePDF(patientId) {
      const patient = patients.find(p => p.id === patientId);
      if (!patient) return;
      if (patient.evolutions.length === 0) { toast('Nenhuma evolução para exportar.', 'error'); return; }

      const { jsPDF } = window.jspdf;
      const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
      const W = 210, marginL = 18, marginR = 18, contentW = W - marginL - marginR;

      function drawHeader(pageNum) {
        // Faixa verde
        doc.setFillColor(30, 74, 48);
        doc.rect(0, 0, W, 28, 'F');

        doc.setTextColor(255, 255, 255);
        doc.setFont('helvetica', 'bold');
        doc.setFontSize(13);
        doc.text('FICHA DE EVOLUÇÃO — FISIOTERAPIA', W / 2, 11, { align: 'center' });

        doc.setFontSize(9);
        doc.setFont('helvetica', 'normal');
        doc.text('Registro clínico de atendimentos fisioterapêuticos', W / 2, 18, { align: 'center' });

        // Sub-faixa clara
        doc.setFillColor(232, 245, 238);
        doc.rect(0, 28, W, 14, 'F');
        doc.setTextColor(30, 74, 48);
        doc.setFont('helvetica', 'bold');
        doc.setFontSize(10);
        doc.text(`Paciente: ${patient.name}`, marginL, 37);
        if (patient.contact) {
          doc.setFont('helvetica', 'normal');
          doc.text(`Contato: ${patient.contact}`, W - marginR, 37, { align: 'right' });
        }
      }

      function drawFooter(pageNum, totalPages) {
        const y = 287;
        doc.setDrawColor(200, 220, 210);
        doc.setLineWidth(.4);
        doc.line(marginL, y - 4, W - marginR, y - 4);

        doc.setTextColor(100, 130, 115);
        doc.setFontSize(8);
        doc.setFont('helvetica', 'italic');

        const fisioName = document.getElementById('footerFisioName').textContent;
        const coren     = document.getElementById('footerFisioCoren').textContent;
        doc.text(`${fisioName} — ${coren}`, marginL, y + 1);
        doc.text(`Página ${pageNum} / ${totalPages}`, W - marginR, y + 1, { align: 'right' });
        doc.text(new Date().toLocaleDateString('pt-BR'), W / 2, y + 1, { align: 'center' });
      }

      // Pré-calcula número total de páginas
      let totalPages = 1;
      let simY = 50;
      patient.evolutions.forEach(ev => {
        const lines = doc.splitTextToSize(ev.text, contentW);
        const h = 10 + (lines.length * 5.2) + 14;
        if (simY + h > 278) { totalPages++; simY = 50; }
        simY += h + 8;
      });

      // Render real
      let page = 1;
      drawHeader(page);
      let y = 50;

      patient.evolutions.forEach((ev, idx) => {
        const lines = doc.splitTextToSize(ev.text, contentW - 4);
        const blockH = 10 + (lines.length * 5.2) + 14;

        if (y + blockH > 278) {
          drawFooter(page, totalPages);
          doc.addPage();
          page++;
          drawHeader(page);
          y = 50;
        }

        // Caixa de evolução
        const isEven = idx % 2 === 0;
        doc.setFillColor(isEven ? 244 : 250, isEven ? 250 : 252, isEven ? 246 : 248);
        doc.setDrawColor(180, 210, 195);
        doc.setLineWidth(.3);
        doc.roundedRect(marginL, y, contentW, blockH, 2, 2, 'FD');

        // Borda lateral verde
        doc.setFillColor(45, 122, 79);
        doc.rect(marginL, y, 3, blockH, 'F');

        // Data
        doc.setTextColor(30, 74, 48);
        doc.setFont('helvetica', 'bold');
        doc.setFontSize(9);
        doc.text(`DATA: ${formatDate(ev.date)}`, marginL + 6, y + 7);

        // Texto
        doc.setFont('helvetica', 'normal');
        doc.setFontSize(9);
        doc.setTextColor(40, 50, 44);
        doc.text(lines, marginL + 6, y + 13);

        // Assinatura
        const sigY = y + blockH - 5;
        doc.setFont('helvetica', 'italic');
        doc.setFontSize(8);
        doc.setTextColor(100, 130, 115);
        doc.text(`Fisioterapeuta: ${ev.signature}`, marginL + 6, sigY);

        y += blockH + 8;
      });

      drawFooter(page, totalPages);
      doc.save(`Evolucao_${patient.name.replace(/ /g, '_')}.pdf`);
      toast('PDF gerado com sucesso!');
    }
  </script>
</body>
</html>
